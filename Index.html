<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Warehouse QR Locator - GAS API</title>
    <!-- Library untuk render QR Code lokal tanpa internet -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        :root { --primary-color: #1e3a8a; --primary-light: #eff6ff; --accent-color: #3b82f6; --text-dark: #1f2937; --text-muted: #6b7280; --border-color: #e5e7eb; --bg-color: #f1f5f9; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-dark); padding: 12px; }
        .container { max-width: 600px; margin: 0 auto; }
        header { background: linear-gradient(135deg, var(--primary-color), #2563eb); color: white; padding: 16px; border-radius: 12px; margin-bottom: 16px; text-align: center; }
        header h1 { font-size: 20px; margin-bottom: 6px; }
        .filter-panel { background: white; padding: 16px; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 20px; display: flex; flex-direction: column; gap: 16px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-control { padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 15px; width: 100%; }
        .btn-search { background-color: var(--accent-color); color: white; border: none; border-radius: 8px; padding: 14px; font-weight: 600; cursor: pointer; }
        .btn-search:disabled { background-color: #93c5fd; }
        .status-message { padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; background-color: #eff6ff; border-left: 4px solid #3b82f6; }
        .hidden { display: none !important; }
        .barcode-card { background: white; border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; margin-bottom: 16px; display: flex; flex-direction: column; }
        .card-header { margin-bottom: 10px; }
        .stype-badge { background-color: var(--primary-light); color: var(--primary-color); padding: 4px 10px; border-radius: 6px; font-weight: 600; font-size: 12px; }
        .product-desc { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
        .barcode-container { background-color: #fff; padding: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .barcode-text { font-family: monospace; font-size: 16px; letter-spacing: 2px; font-weight: bold; margin-top: 12px; color: #0f172a; }
        .no-data { text-align: center; padding: 30px; color: var(--text-muted); }
        .qr-image { width: 150px; height: 150px; display: block; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📦 S-BIN QR Locator</h1>
            <p>Warehouse Info System (Offline Render)</p>
        </header>
        <div class="filter-panel">
            <div id="statusMessage" class="status-message">⚡ Menghubungkan ke API...</div>
            <div class="form-group">
                <label>1. Pilih SType</label>
                <select id="stypeFilter" class="form-control" onchange="handleStypeChange()" disabled><option>-- Menunggu Data --</option></select>
            </div>
            <div class="form-group">
                <label>2. Kata Kunci (Nama / SKU / S-Bin)</label>
                <input type="text" id="productSearch" class="form-control" placeholder="Ketik kata kunci..." disabled onkeypress="if(event.key === 'Enter') executeSearch()">
            </div>
            <button id="searchBtn" class="btn-search" onclick="executeSearch()" disabled>🔍 Cari</button>
        </div>
        <div id="resultsCount" style="text-align:center; font-size: 13px; color: #6b7280; margin-bottom:10px;" class="hidden"></div>
        <div id="productsGrid"><div class="no-data">Data siap. Silakan cari produk.</div></div>
    </div>

    <script>
        // URL WEB APP DARI GOOGLE APPS SCRIPT
        const gasUrl = 'https://script.google.com/macros/s/AKfycbwsXJIbwXzbloAEncfJLq9R1mjMkkG9vGAgaP8jZsMRwipqzVx7YcDo4HFVSKnnHlmzZQ/exec';
        let productData = [];

        async function init() {
            try {
                const response = await fetch(gasUrl);
                const data = await response.json();
                
                // Mulai dari index 1 untuk melewati Header
                for(let i = 1; i < data.length; i++) {
                    const row = data[i];
                    if(row.length >= 4 && row[0]) {
                        productData.push({
                            stype: String(row[0]).trim(),
                            sbin: String(row[1]).trim(),
                            product: String(row[2]).trim(),
                            desc: String(row[3]).trim()
                        });
                    }
                }
                
                const select = document.getElementById('stypeFilter');
                select.innerHTML = '<option value="">-- Pilih SType --</option>' + 
                    [...new Set(productData.map(i => i.stype))].sort().map(s => `<option value="${s}">${s}</option>`).join('');
                select.disabled = false;
                
                const status = document.getElementById('statusMessage');
                status.innerText = "✅ Data berhasil dimuat secepat kilat.";
                status.style.backgroundColor = "#d1fae5"; status.style.borderLeftColor = "#10b981"; status.style.color = "#065f46";
            } catch(e) {
                document.getElementById('statusMessage').innerText = "❌ Gagal memuat data API. Pastikan pengaturan Share/Deploy sudah ke 'Anyone'.";
            }
        }

        function handleStypeChange() {
            if(document.getElementById('stypeFilter').value) {
                document.getElementById('productSearch').disabled = false;
                document.getElementById('searchBtn').disabled = false;
                document.getElementById('productsGrid').innerHTML = '<div class="no-data">Silakan ketik pencarian dan klik Cari.</div>';
            } else {
                document.getElementById('productSearch').disabled = true;
                document.getElementById('searchBtn').disabled = true;
            }
        }

        function executeSearch() {
            const stype = document.getElementById('stypeFilter').value;
            const search = document.getElementById('productSearch').value.toLowerCase();
            const grid = document.getElementById('productsGrid');
            const count = document.getElementById('resultsCount');
            
            if(!stype) return;
            
            // Tampilkan loading state
            grid.innerHTML = '<div class="no-data">⏳ Memproses QR Code...</div>';
            
            // Gunakan setTimeout agar browser tidak freeze saat memproses
            setTimeout(() => {
                const filtered = productData.filter(i => i.stype === stype && 
                    (!search || i.desc.toLowerCase().includes(search) || i.product.toLowerCase().includes(search) || i.sbin.toLowerCase().includes(search))
                );
                
                count.innerText = `Ditemukan ${filtered.length} baris`;
                count.classList.remove('hidden');
                
                if(!filtered.length) { 
                    grid.innerHTML = '<div class="no-data">❌ Tidak ada hasil.</div>'; 
                    return; 
                }
                
                // Render HTML skeleton beserta elemen <canvas> untuk QR
                grid.innerHTML = filtered.map((item, index) => `
                    <div class="barcode-card">
                        <div class="card-header"><span class="stype-badge">${item.stype}</span></div>
                        <div class="product-desc">${item.desc}</div>
                        <div style="font-size:13px; color:#6b7280; margin-bottom:12px; border-bottom:1px dashed #e5e7eb; padding-bottom:10px;">SKU: <strong>${item.product}</strong></div>
                        <div style="font-size:12px; color:#f59e0b; font-weight:800; text-align:center; margin-bottom:8px; letter-spacing: 1px;">📍 S-BIN QR CODE</div>
                        <div class="barcode-container">
                            <canvas id="qr-${index}" class="qr-image"></canvas>
                            <div class="barcode-text">${item.sbin}</div>
                        </div>
                    </div>
                `).join('');

                // Render QR Code secara lokal menggunakan library (sangat cepat)
                filtered.forEach((item, index) => {
                    new QRious({
                        element: document.getElementById(`qr-${index}`),
                        value: item.sbin,
                        size: 150,
                        level: 'M' // Medium error correction level
                    });
                });
            }, 10); // delay kecil untuk merender status loading terlebih dahulu
        }

        init();
    </script>
</body>
</html>
